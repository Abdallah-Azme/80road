workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install -g @ionic/cli
      - name: Next.js build and export
        script: |
          npm run build
          # If you are using Next.js 'output: export', 
          # ensure your 'out' folder is ready for Capacitor.
      - name: Capacitor Sync
        script: |
          npx cap sync ios
      - name: Build iOS (Unsigned)
        script: |
          # This builds the .app folder which we then zip into a .ipa
          xcodebuild build -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Package IPA
        script: |
          # This manually creates the IPA folder structure for testing
          mkdir -p build/Payload
          cp -r build/Build/Products/Release-iphoneos/App.app build/Payload
          cd build && zip -r ios_app.ipa Payload
    artifacts:
      - build/*.ipa
