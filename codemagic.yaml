workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install -g @ionic/cli
      - name: Next.js build and export
        script: |
          npx cross-env MOBILE_BUILD=true NEXT_PUBLIC_IS_MOBILE=true npm run build
      - name: Capacitor Sync
        script: |
          npx cap sync ios
      - name: Build iOS (Unsigned)
        script: |
          # This builds the app without needing a paid Apple Developer account
          xcodebuild build -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Package IPA
        script: |
          # Manually packaging the .app into an .ipa for Appetize.io
          mkdir -p build/Payload
          cp -r build/Build/Products/Release-iphoneos/App.app build/Payload
          cd build && zip -r 80road_app.ipa Payload
    artifacts:
      - build/*.ipa
